<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Skyline — Weather Now</title>
<style>
  :root{
    --ink: #f4ede1;
    --ink-dim: #c9bfae;
    --accent: #ff8a4c;
    --accent-soft: #ffb37a;
    --panel: rgba(20, 24, 38, 0.55);
    --panel-border: rgba(244, 237, 225, 0.12);
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  html, body {
    height: 100%;
    font-family: 'Spectral', Georgia, serif;
  }

  body{
    min-height: 100vh;
    overflow-x: hidden;
    color: var(--ink);
    background: linear-gradient(180deg, #1b1f3a 0%, #2a2f55 40%, #4a3f6b 70%, #6b4f5f 100%);
    transition: background 1.4s ease;
    position: relative;
  }

  body.cond-clear   { background: linear-gradient(180deg, #1c3a5e 0%, #2e6da4 45%, #6fb3d2 80%, #fcd9a0 100%); }
  body.cond-clouds  { background: linear-gradient(180deg, #3a3f4f 0%, #5a6072 45%, #8a8f9c 80%, #b9bdc5 100%); }
  body.cond-rain    { background: linear-gradient(180deg, #131a26 0%, #1f2c3d 45%, #2c3e50 80%, #3d4f60 100%); }
  body.cond-snow    { background: linear-gradient(180deg, #2b3950 0%, #51637e 45%, #9fb2c4 80%, #e8edf2 100%); }
  body.cond-storm   { background: linear-gradient(180deg, #0d0e1a 0%, #181b2e 45%, #262a45 80%, #3a3454 100%); }
  body.cond-mist    { background: linear-gradient(180deg, #2a2f3a 0%, #454c58 45%, #767e88 80%, #aab0b8 100%); }

  .sky-layer{
    position: fixed; inset:0;
    pointer-events:none;
    overflow:hidden;
    z-index: 0;
  }

  .star{
    position:absolute;
    width:2px; height:2px;
    background: var(--ink);
    border-radius:50%;
    opacity:0;
  }

  .drop{
    position:absolute;
    width:2px; height:14px;
    background: linear-gradient(to bottom, transparent, rgba(180,210,255,0.7));
    top:-20px;
  }

  .flake{
    position:absolute;
    width:6px; height:6px;
    background: rgba(255,255,255,0.85);
    border-radius:50%;
    top:-10px;
  }

  .cloud-shape{
    position:absolute;
    width: 180px; height: 60px;
    background: rgba(255,255,255,0.18);
    border-radius: 50px;
    filter: blur(2px);
  }

  header{
    position: relative;
    z-index: 2;
    padding: 48px 24px 24px;
    text-align:center;
  }

  .eyebrow{
    font-family: 'Courier New', monospace;
    letter-spacing: 0.25em;
    font-size: 11px;
    text-transform: uppercase;
    color: var(--accent-soft);
    opacity:0;
  }

  h1{
    font-size: clamp(2.4rem, 6vw, 4rem);
    font-weight: 600;
    letter-spacing: -0.01em;
    margin-top: 8px;
    opacity:0;
  }

  .search-row{
    max-width: 460px;
    margin: 32px auto 0;
    display:flex;
    gap:10px;
    position: relative;
    z-index: 2;
    opacity:0;
  }

  .controls-row{
    max-width: 460px;
    margin: 14px auto 0;
    display:flex;
    gap:10px;
    align-items:center;
    justify-content:center;
    position: relative;
    z-index: 2;
    opacity:0;
  }

  .icon-btn{
    padding: 10px 16px;
    border-radius: 999px;
    border: 1px solid var(--panel-border);
    background: var(--panel);
    color: var(--ink);
    font-family: inherit;
    font-size: 0.85rem;
    cursor:pointer;
    backdrop-filter: blur(8px);
    transition: border-color 0.2s ease, transform 0.15s ease;
    display:flex;
    align-items:center;
    gap:6px;
  }
  .icon-btn:hover{ border-color: var(--accent-soft); transform: translateY(-1px); }
  .icon-btn:disabled{ opacity:0.5; cursor:not-allowed; transform:none; }

  .unit-toggle{
    display:flex;
    border-radius: 999px;
    border: 1px solid var(--panel-border);
    background: var(--panel);
    overflow:hidden;
    backdrop-filter: blur(8px);
  }
  .unit-toggle button{
    padding: 10px 16px;
    border:none;
    background: transparent;
    color: var(--ink-dim);
    font-family: inherit;
    font-size: 0.85rem;
    font-weight:600;
    cursor:pointer;
    transition: background 0.2s ease, color 0.2s ease;
  }
  .unit-toggle button.active{
    background: var(--accent);
    color: #1a1a1a;
  }

  .history-row{
    max-width: 460px;
    margin: 14px auto 0;
    display:flex;
    flex-wrap:wrap;
    gap:8px;
    justify-content:center;
    position: relative;
    z-index: 2;
  }

  .history-chip{
    padding: 6px 14px;
    border-radius: 999px;
    border: 1px solid var(--panel-border);
    background: var(--panel);
    color: var(--ink-dim);
    font-family: 'Courier New', monospace;
    font-size: 11px;
    letter-spacing: 0.03em;
    cursor:pointer;
    backdrop-filter: blur(8px);
    transition: border-color 0.2s ease, color 0.2s ease;
  }
  .history-chip:hover{ border-color: var(--accent-soft); color: var(--ink); }

  .search-row input{
    flex:1;
    padding: 14px 18px;
    border-radius: 999px;
    border: 1px solid var(--panel-border);
    background: var(--panel);
    color: var(--ink);
    font-family: inherit;
    font-size: 1rem;
    outline:none;
    backdrop-filter: blur(8px);
  }
  .search-row input::placeholder{ color: var(--ink-dim); }
  .search-row input:focus{ border-color: var(--accent-soft); }

  .search-row button{
    padding: 14px 26px;
    border-radius: 999px;
    border: none;
    background: var(--accent);
    color: #1a1a1a;
    font-family: inherit;
    font-weight: 600;
    cursor:pointer;
    transition: transform 0.15s ease, background 0.2s ease;
  }
  .search-row button:hover{ background: var(--accent-soft); transform: translateY(-1px); }
  .search-row button:active{ transform: translateY(0); }

  main{
    position: relative;
    z-index: 2;
    max-width: 720px;
    margin: 0 auto;
    padding: 40px 24px 80px;
  }

  .status-line{
    text-align:center;
    font-family: 'Courier New', monospace;
    font-size: 13px;
    color: var(--ink-dim);
    letter-spacing: 0.05em;
    min-height: 20px;
    margin-bottom: 24px;
  }
  .status-line.error{ color: #ff9b7a; }

  .reading{
    display:none;
    text-align:center;
  }
  .reading.active{ display:block; }

  .reading .place{
    font-size: 1.2rem;
    color: var(--ink-dim);
    letter-spacing: 0.03em;
  }

  .reading .temp-row{
    display:flex;
    align-items:center;
    justify-content:center;
    gap: 28px;
    margin: 18px 0 6px;
  }

  .reading .temp{
    font-size: clamp(4.5rem, 14vw, 7.5rem);
    font-weight: 700;
    line-height: 1;
    letter-spacing: -0.02em;
  }

  .reading .glyph{
    font-size: clamp(3rem, 9vw, 4.5rem);
    line-height:1;
  }

  .reading .desc{
    font-size: 1.3rem;
    color: var(--accent-soft);
    text-transform: capitalize;
    margin-bottom: 36px;
  }

  .loader{
    display:none;
    width: 34px; height: 34px;
    margin: 24px auto;
    border-radius: 50%;
    border: 3px solid var(--panel-border);
    border-top-color: var(--accent);
  }
  .loader.active{ display:block; animation: spin 0.8s linear infinite; }

  @keyframes spin{ to{ transform: rotate(360deg); } }

  .stat-grid{
    display:grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 14px;
    margin-top: 10px;
  }

  .stat-grid.extra{
    grid-template-columns: repeat(2, 1fr);
    margin-top: 14px;
  }

  .forecast-section{
    margin-top: 40px;
  }

  .forecast-title{
    font-family: 'Courier New', monospace;
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--ink-dim);
    text-align:left;
    margin-bottom: 14px;
  }

  .forecast-strip{
    display:grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 10px;
  }

  .forecast-card{
    background: var(--panel);
    border: 1px solid var(--panel-border);
    border-radius: 14px;
    padding: 14px 8px;
    text-align:center;
    backdrop-filter: blur(8px);
  }

  .forecast-card .f-day{
    font-family: 'Courier New', monospace;
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--ink-dim);
  }

  .forecast-card .f-glyph{
    font-size: 1.6rem;
    margin: 8px 0 4px;
  }

  .forecast-card .f-temps{
    font-size: 0.85rem;
    font-weight: 600;
  }

  .forecast-card .f-temps .lo{
    color: var(--ink-dim);
    font-weight: 400;
    margin-left: 4px;
  }

  @media (max-width: 560px){
    .forecast-strip{ grid-template-columns: repeat(5, minmax(0,1fr)); gap:6px; }
    .forecast-card{ padding: 10px 4px; }
    .forecast-card .f-glyph{ font-size: 1.3rem; }
    .forecast-card .f-temps{ font-size: 0.72rem; }
  }

  .stat-card{
    background: var(--panel);
    border: 1px solid var(--panel-border);
    border-radius: 16px;
    padding: 18px 12px;
    backdrop-filter: blur(8px);
  }

  .stat-card .label{
    font-family: 'Courier New', monospace;
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--ink-dim);
  }

  .stat-card .value{
    font-size: 1.5rem;
    font-weight: 600;
    margin-top: 6px;
  }

  footer{
    position: relative;
    z-index: 2;
    text-align:center;
    font-family: 'Courier New', monospace;
    font-size: 11px;
    letter-spacing: 0.1em;
    color: var(--ink-dim);
    padding-bottom: 28px;
    opacity: 0.7;
  }

  @media (prefers-reduced-motion: reduce){
    * { animation: none !important; transition: none !important; }
  }
</style>
</head>
<body class="cond-default">

  <div class="sky-layer" id="skyLayer"></div>

  <header>
    <div class="eyebrow" id="eyebrow">CURRENT CONDITIONS</div>
    <h1 id="mainTitle">Skyline</h1>
    <div class="search-row" id="searchRow">
      <input type="text" id="cityInput" placeholder="Enter a city — try Pune, Tokyo, Oslo…" autocomplete="off">
      <button id="searchBtn">Check</button>
    </div>
    <div class="controls-row" id="controlsRow">
      <button class="icon-btn" id="geoBtn">📍 Use My Location</button>
      <div class="unit-toggle" id="unitToggle">
        <button id="unitC" class="active">°C</button>
        <button id="unitF">°F</button>
      </div>
    </div>
    <div class="history-row" id="historyRow"></div>
  </header>

  <main>
    <div class="status-line" id="statusLine">Search a city to begin.</div>
    <div class="loader" id="loader"></div>

    <div class="reading" id="reading">
      <div class="place" id="placeName">—</div>
      <div class="temp-row">
        <div class="glyph" id="glyph">☁</div>
        <div class="temp" id="temp">--°</div>
      </div>
      <div class="desc" id="desc">—</div>

      <div class="stat-grid">
        <div class="stat-card">
          <div class="label">Feels Like</div>
          <div class="value" id="feelsLike">--°</div>
        </div>
        <div class="stat-card">
          <div class="label">Humidity</div>
          <div class="value" id="humidity">--%</div>
        </div>
        <div class="stat-card">
          <div class="label">Wind</div>
          <div class="value" id="wind">-- km/h</div>
        </div>
      </div>

      <div class="stat-grid extra">
        <div class="stat-card">
          <div class="label">Sunrise</div>
          <div class="value" id="sunrise">--:--</div>
        </div>
        <div class="stat-card">
          <div class="label">Sunset</div>
          <div class="value" id="sunset">--:--</div>
        </div>
      </div>

      <div class="forecast-section">
        <div class="forecast-title">5-Day Forecast</div>
        <div class="forecast-strip" id="forecastStrip"></div>
      </div>
    </div>
  </main>

  <footer>BUILT WITH HTML · CSS · JAVASCRIPT · GSAP</footer>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script>
    // ---------- Entrance animation ----------
    gsap.to('#eyebrow', { opacity: 1, y: -4, duration: 0.6, delay: 0.1, ease: 'power2.out' });
    gsap.to('#mainTitle', { opacity: 1, y: 0, duration: 0.9, delay: 0.25, ease: 'power3.out' });
    gsap.fromTo('#mainTitle', { y: 24 }, { y: 0, duration: 0.9, delay: 0.25, ease: 'power3.out' });
    gsap.to('#searchRow', { opacity: 1, y: 0, duration: 0.7, delay: 0.5, ease: 'power2.out' });
    gsap.fromTo('#searchRow', { y: 16 }, { y: 0, duration: 0.7, delay: 0.5, ease: 'power2.out' });
    gsap.to('#controlsRow', { opacity: 1, y: 0, duration: 0.7, delay: 0.65, ease: 'power2.out' });
    gsap.fromTo('#controlsRow', { y: 16 }, { y: 0, duration: 0.7, delay: 0.65, ease: 'power2.out' });

    // ---------- Sky particle layer ----------
    const skyLayer = document.getElementById('skyLayer');

    function clearSky(){
      skyLayer.innerHTML = '';
    }

    function buildStars(count){
      for(let i=0;i<count;i++){
        const s = document.createElement('div');
        s.className = 'star';
        s.style.left = Math.random()*100 + '%';
        s.style.top = Math.random()*60 + '%';
        skyLayer.appendChild(s);
        gsap.to(s, {
          opacity: Math.random()*0.8+0.2,
          duration: 1.5 + Math.random()*2,
          repeat: -1,
          yoyo: true,
          delay: Math.random()*2,
          ease: 'sine.inOut'
        });
      }
    }

    function buildRain(count){
      for(let i=0;i<count;i++){
        const d = document.createElement('div');
        d.className = 'drop';
        d.style.left = Math.random()*100 + '%';
        skyLayer.appendChild(d);
        gsap.fromTo(d,
          { y: -20 },
          {
            y: window.innerHeight + 20,
            duration: 0.6 + Math.random()*0.5,
            repeat: -1,
            delay: Math.random()*2,
            ease: 'none'
          }
        );
      }
    }

    function buildSnow(count){
      for(let i=0;i<count;i++){
        const f = document.createElement('div');
        f.className = 'flake';
        f.style.left = Math.random()*100 + '%';
        f.style.opacity = 0.4 + Math.random()*0.6;
        skyLayer.appendChild(f);
        gsap.to(f, {
          y: window.innerHeight + 20,
          x: '+=' + (Math.random()*80-40),
          duration: 4 + Math.random()*4,
          repeat: -1,
          delay: Math.random()*3,
          ease: 'none'
        });
      }
    }

    function buildClouds(count){
      for(let i=0;i<count;i++){
        const c = document.createElement('div');
        c.className = 'cloud-shape';
        c.style.top = (10 + Math.random()*30) + '%';
        c.style.left = '-200px';
        c.style.width = (140 + Math.random()*120) + 'px';
        skyLayer.appendChild(c);
        gsap.to(c, {
          x: window.innerWidth + 300,
          duration: 30 + Math.random()*30,
          repeat: -1,
          delay: Math.random()*10,
          ease: 'none'
        });
      }
    }

    function setSkyForCondition(cond){
      clearSky();
      if(cond === 'clear'){
        buildStars(0); // daytime clear: no stars, keep calm
      } else if(cond === 'clouds'){
        buildClouds(5);
      } else if(cond === 'rain'){
        buildRain(60);
        buildClouds(3);
      } else if(cond === 'storm'){
        buildRain(90);
        buildClouds(4);
      } else if(cond === 'snow'){
        buildSnow(50);
      } else if(cond === 'mist'){
        buildClouds(6);
      } else {
        buildStars(40);
      }
    }

    // ---------- DOM refs ----------
    const cityInput = document.getElementById('cityInput');
    const searchBtn = document.getElementById('searchBtn');
    const geoBtn = document.getElementById('geoBtn');
    const unitC = document.getElementById('unitC');
    const unitF = document.getElementById('unitF');
    const historyRow = document.getElementById('historyRow');
    const statusLine = document.getElementById('statusLine');
    const loader = document.getElementById('loader');
    const reading = document.getElementById('reading');
    const placeName = document.getElementById('placeName');
    const tempEl = document.getElementById('temp');
    const glyphEl = document.getElementById('glyph');
    const descEl = document.getElementById('desc');
    const feelsLikeEl = document.getElementById('feelsLike');
    const humidityEl = document.getElementById('humidity');
    const windEl = document.getElementById('wind');
    const sunriseEl = document.getElementById('sunrise');
    const sunsetEl = document.getElementById('sunset');
    const forecastStrip = document.getElementById('forecastStrip');
    const bodyEl = document.body;

    // ---------- State ----------
    let unit = 'C'; // 'C' or 'F'
    let lastPlace = null;   // { name, country, latitude, longitude }
    let lastCurrent = null; // raw current block from API (always Celsius/km-h)
    let lastDaily = null;   // raw daily block from API

    const HISTORY_KEY = 'skyline_recent_cities';
    const MAX_HISTORY = 6;

    function setStatus(msg, isError){
      statusLine.textContent = msg;
      statusLine.classList.toggle('error', !!isError);
    }

    function setLoading(isLoading){
      loader.classList.toggle('active', isLoading);
      searchBtn.disabled = isLoading;
      geoBtn.disabled = isLoading;
    }

    function cToF(c){ return (c * 9/5) + 32; }

    function formatTemp(celsiusValue){
      const val = unit === 'C' ? celsiusValue : cToF(celsiusValue);
      return Math.round(val) + '°' + unit;
    }

    function formatTime(isoString){
      if(!isoString) return '--:--';
      const d = new Date(isoString);
      let h = d.getHours();
      const m = d.getMinutes().toString().padStart(2,'0');
      const ampm = h >= 12 ? 'PM' : 'AM';
      h = h % 12; if(h === 0) h = 12;
      return `${h}:${m} ${ampm}`;
    }

    // ---------- LocalStorage: search history ----------
    function getHistory(){
      try{
        const raw = localStorage.getItem(HISTORY_KEY);
        return raw ? JSON.parse(raw) : [];
      } catch(e){
        return [];
      }
    }

    function saveToHistory(place){
      let list = getHistory();
      const label = place.country ? `${place.name}, ${place.country}` : place.name;
      // remove duplicates (case-insensitive), then unshift newest
      list = list.filter(item => item.label.toLowerCase() !== label.toLowerCase());
      list.unshift({
        label,
        name: place.name,
        country: place.country,
        latitude: place.latitude,
        longitude: place.longitude
      });
      list = list.slice(0, MAX_HISTORY);
      try{ localStorage.setItem(HISTORY_KEY, JSON.stringify(list)); } catch(e){ /* storage unavailable */ }
      renderHistory();
    }

    function renderHistory(){
      const list = getHistory();
      historyRow.innerHTML = '';
      if(list.length === 0) return;
      list.forEach(item => {
        const chip = document.createElement('button');
        chip.className = 'history-chip';
        chip.textContent = item.label;
        chip.addEventListener('click', () => {
          cityInput.value = item.name;
          runSearchForPlace(item);
        });
        historyRow.appendChild(chip);
      });
    }

    // ---------- Weather condition mapping ----------
    // Open-Meteo weather codes -> condition bucket
    function mapWeatherCode(code){
      if(code === 0) return { cond: 'clear', glyph: '☀', label: 'clear sky' };
      if([1,2,3].includes(code)) return { cond: 'clouds', glyph: '☁', label: 'partly cloudy' };
      if([45,48].includes(code)) return { cond: 'mist', glyph: '🌫', label: 'misty' };
      if([51,53,55,56,57].includes(code)) return { cond: 'rain', glyph: '🌦', label: 'light drizzle' };
      if([61,63,65,66,67,80,81,82].includes(code)) return { cond: 'rain', glyph: '🌧', label: 'rainy' };
      if([71,73,75,77,85,86].includes(code)) return { cond: 'snow', glyph: '❄', label: 'snowy' };
      if([95,96,99].includes(code)) return { cond: 'storm', glyph: '⛈', label: 'thunderstorm' };
      return { cond: 'clouds', glyph: '☁', label: 'overcast' };
    }

    // ---------- API calls ----------
    async function geocodeCity(city){
      const url = `https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(city)}&count=1&language=en&format=json`;
      const res = await fetch(url);
      if(!res.ok) throw new Error('Geocoding request failed');
      const data = await res.json();
      if(!data.results || data.results.length === 0) throw new Error('City not found');
      return data.results[0];
    }

    async function reverseGeocode(lat, lon){
      const url = `https://geocoding-api.open-meteo.com/v1/search?name=&latitude=${lat}&longitude=${lon}&count=1&language=en&format=json`;
      try{
        const res = await fetch(url);
        if(!res.ok) return null;
        const data = await res.json();
        if(data.results && data.results.length > 0) return data.results[0];
      } catch(e){ /* ignore, fall back to coordinates label */ }
      return null;
    }

    async function fetchWeather(lat, lon){
      const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}` +
        `&current=temperature_2m,relative_humidity_2m,apparent_temperature,weather_code,wind_speed_10m` +
        `&daily=weather_code,temperature_2m_max,temperature_2m_min,sunrise,sunset` +
        `&timezone=auto`;
      const res = await fetch(url);
      if(!res.ok) throw new Error('Weather request failed');
      const data = await res.json();
      return data;
    }

    // ---------- Rendering ----------
    function applyCondition(condInfo){
      bodyEl.className = 'cond-' + condInfo.cond;
      setSkyForCondition(condInfo.cond);
    }

    function renderForecast(daily){
      forecastStrip.innerHTML = '';
      if(!daily || !daily.time) return;

      const dayLabels = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
      // index 0 is today; show next 5 entries (today + 4, or skip today if preferred)
      const count = Math.min(5, daily.time.length);

      for(let i = 0; i < count; i++){
        const dateStr = daily.time[i];
        const d = new Date(dateStr + 'T00:00:00');
        const label = i === 0 ? 'Today' : dayLabels[d.getDay()];
        const code = daily.weather_code[i];
        const condInfo = mapWeatherCode(code);
        const hi = formatTemp(daily.temperature_2m_max[i]);
        const lo = formatTemp(daily.temperature_2m_min[i]);

        const card = document.createElement('div');
        card.className = 'forecast-card';
        card.innerHTML = `
          <div class="f-day">${label}</div>
          <div class="f-glyph">${condInfo.glyph}</div>
          <div class="f-temps">${hi}<span class="lo">${lo}</span></div>
        `;
        forecastStrip.appendChild(card);
      }

      gsap.fromTo('.forecast-card',
        { opacity: 0, y: 14 },
        { opacity: 1, y: 0, duration: 0.45, stagger: 0.06, delay: 0.4, ease: 'power2.out' }
      );
    }

    function renderReading(place, country, current, daily, condInfo){
      placeName.textContent = country ? `${place}, ${country}` : place;
      tempEl.textContent = formatTemp(current.temperature_2m);
      glyphEl.textContent = condInfo.glyph;
      descEl.textContent = condInfo.label;
      feelsLikeEl.textContent = formatTemp(current.apparent_temperature);
      humidityEl.textContent = Math.round(current.relative_humidity_2m) + '%';
      windEl.textContent = Math.round(current.wind_speed_10m) + ' km/h';

      if(daily && daily.sunrise && daily.sunset){
        sunriseEl.textContent = formatTime(daily.sunrise[0]);
        sunsetEl.textContent = formatTime(daily.sunset[0]);
      } else {
        sunriseEl.textContent = '--:--';
        sunsetEl.textContent = '--:--';
      }

      renderForecast(daily);

      reading.classList.add('active');

      gsap.fromTo(reading,
        { opacity: 0, y: 18 },
        { opacity: 1, y: 0, duration: 0.7, ease: 'power3.out' }
      );
      gsap.fromTo('.temp',
        { scale: 0.85, opacity: 0 },
        { scale: 1, opacity: 1, duration: 0.8, delay: 0.1, ease: 'back.out(1.6)' }
      );
      gsap.fromTo('.stat-grid .stat-card',
        { opacity: 0, y: 14 },
        { opacity: 1, y: 0, duration: 0.5, stagger: 0.08, delay: 0.3, ease: 'power2.out' }
      );
    }

    function rerenderCurrentUnits(){
      // Re-render without re-fetching, used when toggling °C/°F
      if(!lastCurrent || !lastPlace) return;
      const condInfo = mapWeatherCode(lastCurrent.weather_code);
      renderReading(lastPlace.name, lastPlace.country, lastCurrent, lastDaily, condInfo);
    }

    // ---------- Core search flow ----------
    async function runSearchForPlace(place){
      setStatus('Checking the sky over ' + place.name + '…');
      setLoading(true);
      reading.classList.remove('active');

      try{
        const data = await fetchWeather(place.latitude, place.longitude);
        const current = data.current;
        const daily = data.daily;
        const condInfo = mapWeatherCode(current.weather_code);

        lastPlace = place;
        lastCurrent = current;
        lastDaily = daily;

        applyCondition(condInfo);
        renderReading(place.name, place.country, current, daily, condInfo);
        setStatus('Last checked just now.');
        saveToHistory(place);
      } catch(err){
        setStatus(err.message || 'Something went wrong. Try another city.', true);
        reading.classList.remove('active');
      } finally{
        setLoading(false);
      }
    }

    async function handleSearch(){
      const city = cityInput.value.trim();
      if(!city){
        setStatus('Type a city name first.', true);
        return;
      }
      setLoading(true);
      try{
        const place = await geocodeCity(city);
        await runSearchForPlace(place);
      } catch(err){
        setStatus(err.message || 'Something went wrong. Try another city.', true);
        setLoading(false);
      }
    }

    function handleGeolocate(){
      if(!navigator.geolocation){
        setStatus('Geolocation is not supported on this device.', true);
        return;
      }
      setStatus('Locating you…');
      setLoading(true);

      navigator.geolocation.getCurrentPosition(
        async (pos) => {
          const { latitude, longitude } = pos.coords;
          let place = await reverseGeocode(latitude, longitude);
          if(!place){
            place = { name: 'Your Location', country: '', latitude, longitude };
          }
          cityInput.value = place.name;
          await runSearchForPlace(place);
        },
        (err) => {
          setStatus('Could not access your location. Please allow permission or search manually.', true);
          setLoading(false);
        },
        { timeout: 10000 }
      );
    }

    function setUnit(newUnit){
      if(unit === newUnit) return;
      unit = newUnit;
      unitC.classList.toggle('active', unit === 'C');
      unitF.classList.toggle('active', unit === 'F');
      rerenderCurrentUnits();
    }

    // ---------- Event bindings ----------
    searchBtn.addEventListener('click', handleSearch);
    cityInput.addEventListener('keydown', (e) => {
      if(e.key === 'Enter') handleSearch();
    });
    geoBtn.addEventListener('click', handleGeolocate);
    unitC.addEventListener('click', () => setUnit('C'));
    unitF.addEventListener('click', () => setUnit('F'));

    // initial ambient sky before first search
    buildStars(30);
    renderHistory();
  </script>
</body>
</html>
